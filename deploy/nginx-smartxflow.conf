# SmartXFlow — Nginx Konfigürasyonu
# Dosya: /etc/nginx/sites-available/smartxflow
#
# KURULUM ADIMLARI:
#   1. Bu dosyayı /etc/nginx/sites-available/smartxflow konumuna kopyala
#   2. ln -sf /etc/nginx/sites-available/smartxflow /etc/nginx/sites-enabled/smartxflow
#   3. nginx -t && systemctl reload nginx
#   4. DNS A kaydı 91.99.6.245'e yönlenince: bash deploy/setup_ssl.sh
#
# SSL kurulduktan sonra certbot HTTP→HTTPS redirect'i ve 443 bloğunu
# otomatik ekler — bu dosya nihai halini gösterir.

# ── HTTP: Let's Encrypt challenge + HTTPS yönlendirme ───────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name smartxflow.com www.smartxflow.com;

    # Let's Encrypt domain doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tüm HTTP trafiğini HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: SSL + Proxy ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name smartxflow.com www.smartxflow.com;

    # Let's Encrypt sertifikaları (certbot tarafından otomatik oluşturulur)
    ssl_certificate     /etc/letsencrypt/live/smartxflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartxflow.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Güvenlik başlıkları
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # Gunicorn'a proxy
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120;
        proxy_connect_timeout 120;
        client_max_body_size  10m;
    }

    # Static dosyalar için nginx cache (opsiyonel iyileştirme)
    location /static/ {
        alias /opt/smartxflow/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
