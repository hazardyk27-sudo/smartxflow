name: Build SmartXFlow Apps

on:
  workflow_dispatch:
  push:
    paths:
      - 'desktop/desktop_app.py'
      - 'desktop/desktop_app.spec'
      - 'desktop/desktop_app/**'
      - 'desktop/scraper_standalone/**'
      - 'app.py'
      - 'templates/**'
      - 'static/**'

jobs:
  build-desktop:
    name: Build Desktop App V1.05
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview flask flask-compress requests httpx beautifulsoup4 pytz certifi pythonnet
    
    - name: Build Desktop executable
      working-directory: desktop
      run: |
        pyinstaller desktop_app.spec
    
    - name: Upload Desktop App
      uses: actions/upload-artifact@v4
      with:
        name: SmartXFlowDesktop-V1.05
        path: desktop/dist/SmartXFlowDesktopV1.05.exe
        retention-days: 30

  build-admin:
    name: Build Admin Panel
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r desktop/scraper_standalone/requirements.txt
        pip install pyinstaller==6.3.0
    
    - name: Create config with secrets
      shell: bash
      run: |
        echo '{"SUPABASE_URL": "${{ secrets.SUPABASE_URL }}", "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}", "TELEGRAM_BOT_TOKEN": "${{ secrets.TELEGRAM_BOT_TOKEN }}", "TELEGRAM_CHAT_ID": "${{ secrets.TELEGRAM_CHAT_ID }}", "excapper_cookie": "${{ secrets.excapper_cookie }}", "SCRAPE_INTERVAL_MINUTES": 10}' > desktop/scraper_standalone/config.json

    - name: Create BUILD_INFO.txt
      shell: bash
      run: |
        echo "SmartXFlow Admin Panel v1.27" > desktop/scraper_standalone/BUILD_INFO.txt
        echo "Build Date: $(date)" >> desktop/scraper_standalone/BUILD_INFO.txt
        echo "Commit: ${{ github.sha }}" >> desktop/scraper_standalone/BUILD_INFO.txt

    - name: Build Admin executable
      working-directory: desktop/scraper_standalone
      run: |
        pyinstaller admin.spec
    
    - name: Upload Admin Panel
      uses: actions/upload-artifact@v4
      with:
        name: SmartXFlowAdmin
        path: desktop/scraper_standalone/dist/SmartXFlowAdminV1.27.exe
        retention-days: 30
