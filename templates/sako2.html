<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şako2 — SmartXFlow Odds & Volume Similarity</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap"></noscript>
    <link rel="stylesheet" href="/static/css/style.css?v=1773116400">
    <link rel="stylesheet" href="/static/css/sako2.css?v=1773286400">
</head>
<body class="sako-body">
    <header class="header">
        <div class="header-left">
            <div class="logo-container">
                <a href="/app" class="sako-back-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                </a>
                <div class="app-logo">
                    <span class="logo-smart">ŞAKO2</span>
                    <img src="/static/images/smartxflow_logo.png" alt="SmartFlow" class="logo-icon">
                </div>
                <div class="logo-subtitle">Odds & Volume Similarity</div>
            </div>
        </div>
        <div class="header-right">
            <a href="/sako" class="sako-nav-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                <span>Şako v1</span>
            </a>
            <a href="/app" class="sako-nav-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Ana Sayfa</span>
            </a>
        </div>
    </header>

    <main class="sako-main">
        <section class="sako-search-section">
            <div class="sako-search-card">
                <div class="sako-search-title">Maç Seç</div>
                <div class="sako-search-desc">Oran + hacim + para dağılımı bazlı benzer maç bul</div>
                <div class="sako-search-box">
                    <svg class="sako-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="sako2SearchInput" class="sako-search-input" placeholder="Maç adı, lig veya takım ara..." autocomplete="off" spellcheck="false">
                    <button class="sako-search-clear" id="sako2SearchClear" onclick="clearSako2Search()">&times;</button>
                </div>
                <div class="s2-market-filter">
                    <button class="s2-mf-btn active" data-market="all">Hepsi</button>
                    <button class="s2-mf-btn" data-market="1x2">1X2</button>
                    <button class="s2-mf-btn" data-market="ou25">ÜA 2.5</button>
                    <button class="s2-mf-btn" data-market="kg">KG</button>
                </div>
                <div class="sako-dropdown" id="sako2Dropdown"></div>
            </div>
        </section>

        <section class="sako-loading" id="sako2Loading" style="display:none">
            <div class="sako-spinner"></div>
            <div class="sako-loading-text">Benzer maçlar aranıyor...</div>
        </section>

        <section class="sako-results" id="sako2Results" style="display:none">
            <div class="sako-summary-card" id="sako2Summary"></div>

            <div class="sako-section-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                Sonuç Dağılımı
            </div>
            <div class="sako-distribution" id="sako2Distribution"></div>

            <div class="sako-section-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Genel Özet
            </div>
            <div class="sako-pattern" id="sako2Pattern"></div>

            <div class="sako-section-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                En Benzer <span id="sako2MatchCount">0</span> Maç
            </div>
            <div class="sako-matches" id="sako2Matches"></div>
        </section>

        <section class="sako-empty" id="sako2Empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <div class="sako-empty-title">Şako2 Hazır</div>
            <div class="sako-empty-desc">Oran, hacim ve para dağılımı bazlı benzerlik motoru</div>
        </section>
    </main>

    <script src="/static/js/sako2.js?v=1773286600"></script>
</body>
</html>
