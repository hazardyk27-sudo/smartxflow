<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smarkets Exchange — SmartXFlow</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap"></noscript>
    <link rel="stylesheet" href="/static/css/style.css?v=1773116400">
    <link rel="stylesheet" href="/static/css/smarkets.css?v=1773522700">
</head>
<body class="sako-body">
    <header class="header">
        <div class="header-left">
            <div class="logo-container">
                <a href="/app" class="sako-back-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                </a>
                <div class="app-logo">
                    <span class="logo-smart">SMARKETS</span>
                    <img src="/static/images/smartxflow_logo.png" alt="SmartFlow" class="logo-icon">
                </div>
                <div class="logo-subtitle">Exchange Order Book Monitor</div>
            </div>
        </div>
        <div class="header-right">
            <div class="sm-status" id="smStatus">
                <span class="sm-status-dot"></span>
                <span class="sm-status-text">Bekleniyor</span>
            </div>
            <a href="/app" class="sako-nav-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Ana Sayfa</span>
            </a>
        </div>
    </header>

    <main class="sm-main">
        <div class="sm-info-bar" id="smInfoBar">
            <span class="sm-info-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            </span>
            <span class="sm-info-text">
                En yuksek hacimli 3 mac otomatik yukleniyor. Veriler <strong>5 dakikada</strong> bir guncellenir. İlk yuklemeden sonra per-selection eslesme tahmini gorunur.
            </span>
        </div>

        <section class="sm-loading" id="smLoading">
            <div class="sako-spinner"></div>
            <div class="sm-loading-text">Smarkets verileri yukleniyor...</div>
        </section>

        <section class="sm-error" id="smError" style="display:none">
            <div class="sm-error-icon">!</div>
            <div class="sm-error-text" id="smErrorText"></div>
            <button class="sm-retry-btn" onclick="smFetchData()">Tekrar Dene</button>
        </section>

        <section class="sm-events" id="smEvents" style="display:none"></section>

        <div class="sm-footer-info" id="smFooterInfo" style="display:none">
            <span class="sm-footer-label">Son guncelleme:</span>
            <span class="sm-footer-time" id="smLastUpdate">--:--</span>
            <span class="sm-footer-sep">|</span>
            <span class="sm-footer-label">Sonraki:</span>
            <span class="sm-footer-countdown" id="smCountdown">5:00</span>
        </div>
    </main>

    <script src="/static/js/smarkets.js?v=1773522700"></script>
</body>
</html>
