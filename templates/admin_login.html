<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartXFlow - Admin Giriş</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #141719;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1c1f23;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }
        .lock-icon { text-align: center; margin-bottom: 20px; }
        .lock-icon svg { width: 48px; height: 48px; }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .login-brand img { width: 32px; height: 32px; }
        .login-brand span { font-size: 22px; font-weight: 700; color: #e6edf3; }
        .login-subtitle {
            text-align: center;
            font-size: 13px;
            color: #484f58;
            margin-bottom: 36px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8b949e;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #141719;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #e6edf3;
            font-size: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: rgba(43,255,136,0.4); }
        .form-group input::placeholder { color: #30363d; }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2BFF88;
            color: #06110B;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .login-btn:hover { background: #24e078; transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }
        .error-msg {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.2);
            color: #f85149;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(43,255,136,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <div class="login-brand">
            <span>Smart</span><img src="/static/images/smartxflow_logo.png" alt="X"><span>Flow</span>
        </div>
        <div class="login-subtitle">Admin Panel Girişi</div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label>Supabase URL</label>
                <input type="text" name="supabase_url" placeholder="https://..." required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Supabase Anon Key</label>
                <input type="password" name="supabase_key" placeholder="eyJ..." required autocomplete="off">
            </div>
            <button type="submit" class="login-btn">Giriş Yap</button>
        </form>
    </div>
</body>
</html>
