<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title>SmartXFlow - Analizciler</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; max-width: 100vw; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #141719;
            color: #c9d1d9;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a { text-decoration: none; color: inherit; }

        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(10, 14, 20, 0.10);
            backdrop-filter: blur(18px) saturate(1.2);
            -webkit-backdrop-filter: blur(18px) saturate(1.2);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            height: 72px;
            transition: background 0.3s;
        }
        .navbar.scrolled {
            background: rgba(10, 14, 20, 0.25);
            backdrop-filter: blur(24px) saturate(1.4);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        .navbar-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            height: 100%; display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand { display: flex; align-items: center; gap: 4px; }
        .nav-brand img { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(43,255,136,0.22)); }
        .nav-brand span { font-size: 20px; font-weight: 600; color: #e6edf3; letter-spacing: 0.3px; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a { padding: 8px 14px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.5); border-radius: 999px; transition: all 160ms; }
        .nav-links a:hover { color: rgba(255,255,255,0.9); }
        .nav-links a.active { color: rgba(255,255,255,0.95); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }
        .nav-links a.nav-cta { background: #2BFF88; color: #06110B; font-weight: 700; margin-left: 6px; padding: 8px 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 8px 24px rgba(43,255,136,0.15); }
        .nav-links a.nav-cta:hover { background: #24e078; transform: translateY(-1px); }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; z-index: 1001; }
        .hamburger span { display: block; width: 22px; height: 2px; background: #c9d1d9; border-radius: 2px; transition: all 0.3s; }
        .mobile-menu { display: none; position: fixed; top: 72px; left: 0; right: 0; background: rgba(10,14,20,0.98); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 16px 24px; flex-direction: column; gap: 4px; z-index: 999; }
        .mobile-menu.open { display: flex; }
        .mobile-menu a { padding: 12px 16px; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.55); border-radius: 12px; }
        .mobile-menu a:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.04); }
        .mobile-menu a.active { color: rgba(255,255,255,0.95); background: rgba(255,255,255,0.06); }
        .mobile-menu a.nav-cta { background: #2BFF88; color: #06110B; text-align: center; font-weight: 700; margin-top: 8px; border-radius: 999px; }

        .page-content { flex: 1; max-width: 900px; margin: 0 auto; width: 100%; padding: 96px 24px 80px; }

        .page-back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: #8b949e; cursor: pointer; margin-bottom: 24px; padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); transition: all 0.2s; }
        .page-back:hover { color: #e6edf3; border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }
        .page-back svg { width: 14px; height: 14px; }

        .page-title { font-size: 28px; font-weight: 800; color: #e6edf3; letter-spacing: -0.5px; margin-bottom: 6px; }
        .page-subtitle { font-size: 14px; color: #8b949e; margin-bottom: 32px; }

        .analyst-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

        .analyst-card {
            background: #1c1f23; border: 1px solid #2e3238; border-radius: 14px;
            padding: 24px 20px; cursor: pointer; transition: all 0.25s ease;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .analyst-card:hover { border-color: rgba(43,255,136,0.3); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
        .analyst-avatar {
            width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
            border: 2px solid rgba(43,255,136,0.25); margin-bottom: 14px;
            background: #2e3238;
        }
        .analyst-avatar-placeholder {
            width: 64px; height: 64px; border-radius: 50%; margin-bottom: 14px;
            background: linear-gradient(135deg, rgba(43,255,136,0.15), rgba(88,166,255,0.15));
            border: 2px solid rgba(43,255,136,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700; color: #2BFF88;
        }
        .analyst-name { font-size: 17px; font-weight: 700; color: #e6edf3; margin-bottom: 4px; }
        .analyst-bio { font-size: 12px; color: #8b949e; margin-bottom: 14px; line-height: 1.5; max-width: 220px; }
        .analyst-stats-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .analyst-stat { display: flex; flex-direction: column; align-items: center; }
        .analyst-stat-value { font-size: 16px; font-weight: 700; color: #e6edf3; }
        .analyst-stat-value.green { color: #3fb950; }
        .analyst-stat-label { font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .profile-header {
            background: #1c1f23; border: 1px solid #2e3238; border-radius: 16px;
            padding: 32px; margin-bottom: 28px; display: flex; align-items: center; gap: 24px;
        }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(43,255,136,0.3); flex-shrink: 0; background: #2e3238; }
        .profile-avatar-placeholder { width: 80px; height: 80px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, rgba(43,255,136,0.15), rgba(88,166,255,0.15)); border: 3px solid rgba(43,255,136,0.25); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #2BFF88; }
        .profile-info { flex: 1; }
        .profile-name { font-size: 24px; font-weight: 800; color: #e6edf3; letter-spacing: -0.3px; margin-bottom: 4px; }
        .profile-bio { font-size: 13px; color: #8b949e; line-height: 1.6; margin-bottom: 14px; }
        .profile-stats { display: flex; gap: 20px; flex-wrap: wrap; }
        .profile-stat-box {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; padding: 10px 16px; text-align: center; min-width: 80px;
        }
        .profile-stat-num { font-size: 18px; font-weight: 700; color: #e6edf3; }
        .profile-stat-num.green { color: #3fb950; }
        .profile-stat-num.amber { color: #d29922; }
        .profile-stat-lbl { font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .date-group { margin-bottom: 24px; }
        .date-group-header {
            font-size: 13px; font-weight: 700; color: #8b949e; text-transform: uppercase;
            letter-spacing: 0.8px; padding: 8px 0; margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 8px;
        }
        .date-group-header svg { width: 14px; height: 14px; color: #6e7681; }
        .date-group-count { font-size: 11px; font-weight: 500; color: #6e7681; background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 10px; }

        .analysis-item {
            background: #1c1f23; border: 1px solid #2e3238; border-radius: 12px;
            padding: 18px 20px; margin-bottom: 10px; transition: border-color 0.2s;
        }
        .analysis-item:hover { border-color: rgba(255,255,255,0.1); }
        .analysis-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
        .analysis-item-title { font-size: 15px; font-weight: 700; color: #e6edf3; }
        .analysis-result-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
        .badge-won { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid rgba(63,185,80,0.25); }
        .badge-lost { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.25); }
        .badge-push { background: rgba(210,153,34,0.15); color: #d29922; border: 1px solid rgba(210,153,34,0.25); }
        .badge-void { background: rgba(139,148,158,0.15); color: #8b949e; border: 1px solid rgba(139,148,158,0.25); }
        .badge-pending { background: rgba(88,166,255,0.1); color: #58a6ff; border: 1px solid rgba(88,166,255,0.2); }
        .analysis-meta { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .meta-tag { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px; }
        .meta-odds { background: rgba(43,255,136,0.1); color: #2BFF88; border: 1px solid rgba(43,255,136,0.2); }
        .meta-conf { background: rgba(88,166,255,0.1); color: #58a6ff; border: 1px solid rgba(88,166,255,0.2); }
        .analysis-content { font-size: 13px; color: #8b949e; line-height: 1.7; }
        .analysis-time { font-size: 11px; color: #484f58; margin-top: 10px; }

        .empty-day {
            background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.06);
            border-radius: 10px; padding: 20px; text-align: center;
            font-size: 13px; color: #484f58; font-style: italic;
        }

        .loading-state { text-align: center; padding: 80px 24px; }
        .loading-spinner-lg { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.06); border-top-color: #2BFF88; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 80px 24px; background: #1c1f23; border: 1px solid #2e3238; border-radius: 16px; }
        .empty-state h3 { font-size: 20px; font-weight: 700; color: #e6edf3; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; color: #8b949e; }

        .footer { padding: 40px 24px; border-top: 1px solid rgba(255,255,255,0.04); text-align: center; margin-top: auto; }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .footer-row { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .footer-row-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.08); }
        .footer-row a { font-size: 13px; color: #484f58; transition: color 0.2s; }
        .footer-row a:hover { color: #2BFF88; }
        .footer-brand { display: flex; align-items: center; gap: 3px; }
        .footer-brand img { width: 18px; height: 18px; }
        .footer-brand span { font-size: 13px; font-weight: 600; color: #3d444d; letter-spacing: 0.3px; }
        .footer-copy { font-size: 12px; color: #2e3238; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .navbar-inner { padding: 0 16px; }
            .page-content { padding: 88px 16px 60px; }
            .page-title { font-size: 22px; }
            .analyst-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .analyst-card { padding: 18px 14px; }
            .analyst-avatar, .analyst-avatar-placeholder { width: 48px; height: 48px; font-size: 18px; }
            .analyst-name { font-size: 14px; }
            .analyst-bio { font-size: 11px; }
            .analyst-stat-value { font-size: 14px; }
            .profile-header { flex-direction: column; text-align: center; padding: 24px 18px; gap: 16px; }
            .profile-stats { justify-content: center; }
            .profile-name { font-size: 20px; }
            .analysis-item { padding: 14px 16px; }
            .analysis-item-title { font-size: 14px; }
            .footer { padding: 30px 16px; }
        }
        @media (max-width: 400px) {
            .analyst-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script>
        function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }

        function escapeHtml(t) { if(!t)return''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

        const TR_MONTHS = ['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
        const TR_DAYS = ['Pazar','Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi'];

        function formatDateTR(dateStr) {
            try {
                const parts = dateStr.split('-');
                const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
                return `${d.getDate()} ${TR_MONTHS[d.getMonth()]} ${d.getFullYear()}, ${TR_DAYS[d.getDay()]}`;
            } catch(e) { return dateStr; }
        }

        function formatTimeTR(isoStr) {
            try {
                const d = new Date(isoStr);
                return d.toLocaleString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch(e) { return ''; }
        }

        function getResultBadge(result) {
            if (!result) return '<span class="analysis-result-badge badge-pending">Beklemede</span>';
            const map = {
                'won': ['Kazandı', 'badge-won'],
                'lost': ['Kaybetti', 'badge-lost'],
                'push': ['İade', 'badge-push'],
                'void': ['İptal', 'badge-void']
            };
            const [label, cls] = map[result] || ['Beklemede', 'badge-pending'];
            return `<span class="analysis-result-badge ${cls}">${label}</span>`;
        }

        function getAvatarHtml(analyst, size) {
            const cls = size === 'lg' ? 'profile-avatar' : 'analyst-avatar';
            const plcCls = size === 'lg' ? 'profile-avatar-placeholder' : 'analyst-avatar-placeholder';
            if (analyst.avatar_url) {
                return `<img class="${cls}" src="${analyst.avatar_url}" alt="${escapeHtml(analyst.name)}">`;
            }
            const initial = (analyst.name || '?').charAt(0).toUpperCase();
            return `<div class="${plcCls}">${initial}</div>`;
        }

        async function loadAnalystList() {
            const view = document.getElementById('mainView');
            view.innerHTML = `
                <h1 class="page-title">Analizciler</h1>
                <p class="page-subtitle">Profesyonel piyasa analizcileri ve gecmis performanslari.</p>
                <div class="loading-state"><div class="loading-spinner-lg"></div><p style="color:#8b949e;font-size:13px;">Yukleniyor...</p></div>
            `;
            try {
                const resp = await fetch('/api/analysts?active=true');
                const analysts = await resp.json();
                if (!analysts || analysts.length === 0) {
                    view.innerHTML = `
                        <h1 class="page-title">Analizciler</h1>
                        <p class="page-subtitle">Profesyonel piyasa analizcileri ve gecmis performanslari.</p>
                        <div class="empty-state"><h3>Henuz analizci bulunmuyor</h3><p>Yakinda profesyonel analizcilerimiz burada yer alacak.</p></div>
                    `;
                    return;
                }
                let cards = analysts.map(a => {
                    const s = a.stats || {};
                    const pct = s.success_pct ? parseFloat(s.success_pct).toFixed(0) : '0';
                    const avgOdds = s.avg_odds ? parseFloat(s.avg_odds).toFixed(2) : '-';
                    return `
                        <div class="analyst-card" onclick="loadAnalystDetail(${a.id})">
                            ${getAvatarHtml(a, 'sm')}
                            <div class="analyst-name">${escapeHtml(a.name)}</div>
                            ${a.bio ? `<div class="analyst-bio">${escapeHtml(a.bio)}</div>` : ''}
                            <div class="analyst-stats-row">
                                <div class="analyst-stat">
                                    <div class="analyst-stat-value green">%${pct}</div>
                                    <div class="analyst-stat-label">Basari</div>
                                </div>
                                <div class="analyst-stat">
                                    <div class="analyst-stat-value">${s.total || 0}</div>
                                    <div class="analyst-stat-label">Analiz</div>
                                </div>
                                <div class="analyst-stat">
                                    <div class="analyst-stat-value">${avgOdds}</div>
                                    <div class="analyst-stat-label">Ort. Oran</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                view.innerHTML = `
                    <h1 class="page-title">Analizciler</h1>
                    <p class="page-subtitle">Profesyonel piyasa analizcileri ve gecmis performanslari.</p>
                    <div class="analyst-grid">${cards}</div>
                `;
            } catch(e) {
                view.innerHTML = `
                    <h1 class="page-title">Analizciler</h1>
                    <p class="page-subtitle">Profesyonel piyasa analizcileri ve gecmis performanslari.</p>
                    <div class="empty-state"><h3>Bir hata olustu</h3><p>Lutfen sayfayi yenileyin.</p></div>
                `;
            }
        }

        async function loadAnalystDetail(id) {
            const view = document.getElementById('mainView');
            view.innerHTML = `<div class="loading-state"><div class="loading-spinner-lg"></div><p style="color:#8b949e;font-size:13px;">Yukleniyor...</p></div>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            history.pushState({ analystId: id }, '', `/analysis#analyst-${id}`);
            try {
                const resp = await fetch(`/api/analysts/${id}/analyses`);
                if (!resp.ok) throw new Error('API error');
                const data = await resp.json();
                const a = data.analyst;
                const groups = data.date_groups || [];
                const s = a.stats || {};
                const pct = s.success_pct ? parseFloat(s.success_pct).toFixed(0) : '0';
                const avgOdds = s.avg_odds ? parseFloat(s.avg_odds).toFixed(2) : '-';

                let profileHtml = `
                    <div class="page-back" onclick="goBack()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        Tum Analizciler
                    </div>
                    <div class="profile-header">
                        ${getAvatarHtml(a, 'lg')}
                        <div class="profile-info">
                            <div class="profile-name">${escapeHtml(a.name)}</div>
                            ${a.bio ? `<div class="profile-bio">${escapeHtml(a.bio)}</div>` : ''}
                            <div class="profile-stats">
                                <div class="profile-stat-box">
                                    <div class="profile-stat-num green">%${pct}</div>
                                    <div class="profile-stat-lbl">Basari</div>
                                </div>
                                <div class="profile-stat-box">
                                    <div class="profile-stat-num">${s.total || 0}</div>
                                    <div class="profile-stat-lbl">Toplam</div>
                                </div>
                                <div class="profile-stat-box">
                                    <div class="profile-stat-num" style="color:#3fb950;">${s.won || 0}</div>
                                    <div class="profile-stat-lbl">Kazanan</div>
                                </div>
                                <div class="profile-stat-box">
                                    <div class="profile-stat-num" style="color:#f85149;">${s.lost || 0}</div>
                                    <div class="profile-stat-lbl">Kaybeden</div>
                                </div>
                                <div class="profile-stat-box">
                                    <div class="profile-stat-num amber">${avgOdds}</div>
                                    <div class="profile-stat-lbl">Ort. Oran</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                let groupsHtml = '';
                if (groups.length === 0) {
                    groupsHtml = `<div class="empty-day">Henuz analiz mevcut degil</div>`;
                } else {
                    for (const g of groups) {
                        const dateLabel = formatDateTR(g.date);
                        const itemCount = g.items.length;
                        let itemsHtml = g.items.map(item => {
                            let metaHtml = '';
                            if (item.preference) metaHtml += `<span class="meta-tag" style="background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.08));border-color:rgba(139,92,246,0.25);color:#a78bfa;font-weight:700;font-size:13px;">🎯 ${escapeHtml(item.preference)}</span>`;
                            if (item.odds) metaHtml += `<span class="meta-tag meta-odds">Oran: ${escapeHtml(item.odds)}</span>`;
                            if (item.confidence) metaHtml += `<span class="meta-tag meta-conf">Guven: ${item.confidence}/10</span>`;
                            return `
                                <div class="analysis-item">
                                    <div class="analysis-item-header">
                                        <div class="analysis-item-title">${escapeHtml(item.title)}</div>
                                        ${getResultBadge(item.result)}
                                    </div>
                                    ${metaHtml ? `<div class="analysis-meta">${metaHtml}</div>` : ''}
                                    ${item.result_note ? `<div class="analysis-content">${escapeHtml(item.result_note)}</div>` : ''}
                                    <div class="analysis-time">${formatTimeTR(item.created_at)}</div>
                                </div>
                            `;
                        }).join('');
                        groupsHtml += `
                            <div class="date-group">
                                <div class="date-group-header">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                    ${dateLabel}
                                    <span class="date-group-count">${itemCount} analiz</span>
                                </div>
                                ${itemsHtml}
                            </div>
                        `;
                    }
                }

                view.innerHTML = profileHtml + groupsHtml;
            } catch(e) {
                view.innerHTML = `
                    <div class="page-back" onclick="goBack()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        Tum Analizciler
                    </div>
                    <div class="empty-state"><h3>Bir hata olustu</h3><p>Analizci bilgileri yuklenemedi.</p></div>
                `;
            }
        }

        function goBack() {
            history.pushState(null, '', '/analysis');
            loadAnalystList();
        }

        function handleRoute() {
            const hash = window.location.hash;
            const match = hash.match(/^#analyst-(\d+)$/);
            if (match) {
                loadAnalystDetail(parseInt(match[1]));
            } else {
                loadAnalystList();
            }
        }

        window.addEventListener('popstate', handleRoute);

        document.addEventListener('DOMContentLoaded', handleRoute);

        window.addEventListener('scroll', function() {
            var navbar = document.querySelector('.navbar');
            if (window.scrollY > 40) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });
    </script>
</body>
</html>
